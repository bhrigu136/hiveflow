{% extends "base.html" %}
{% block title %}Create Team — HiveFlow{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 40px auto;">
    <div class="auth-card" style="background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 40px;">
        <div class="auth-header" style="text-align: center; margin-bottom: 30px;">
            <div style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i data-lucide="users" style="color: white; width: 28px; height: 28px;"></i>
            </div>
            <h2 style="margin: 0; font-size: 24px;">Create a New Team</h2>
            <p style="color: var(--text-muted); margin-top: 8px;">Start collaborating on projects together.</p>
        </div>

        <form method="POST" action="{{ url_for('orgs.create_org') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="auth-form-group" style="margin-bottom: 20px;">
                <label for="name" style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Team Name</label>
                <div class="auth-input-wrapper" style="position: relative;">
                    <span class="auth-input-icon" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                        <i data-lucide="briefcase" style="width: 18px; height: 18px;"></i>
                    </span>
                    <input type="text" id="name" name="name" required placeholder="E.g., CS101 Final Project" style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-color); box-sizing: border-box;">
                </div>
            </div>

            <div class="auth-form-group" style="margin-bottom: 25px;">
                <label for="description" style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Description (Optional)</label>
                <textarea id="description" name="description" rows="3" placeholder="What is this team for?" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-color); box-sizing: border-box; resize: vertical; font-family: inherit;"></textarea>
            </div>

            <button type="submit" class="auth-btn" style="width: 100%; padding: 12px; background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                Create Team <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
